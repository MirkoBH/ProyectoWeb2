<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Confirmación de Email</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body { font-family: sans-serif; text-align: center; margin-top: 10vh; }
    .msg { font-size: 1.3em; margin-top: 2em; }
    .loader { margin: 2em auto; border: 6px solid #f3f3f3; border-top: 6px solid #3498db; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
    @keyframes spin { 100% { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <h1>Confirmando tu email...</h1>
  <div class="loader"></div>
  <div class="msg" id="msg"></div>
  <script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';
    const supabase = createClient('https://jorfexmeiovcwrdndwjw.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpvcmZleG1laW92Y3dyZG5kd2p3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ2NDE1OTUsImV4cCI6MjA5MDIxNzU5NX0.13cewtiS3URY7Cwaw5hRgktoeUtHpf2zMV7jMXF9BRA');
    const msg = document.getElementById('msg');
    try {
      const { data, error } = await supabase.auth.getSession();
      if (error) {
        msg.textContent = 'Error al confirmar el email: ' + error.message;
      } else {
        msg.textContent = '¡Tu email fue confirmado correctamente! Ya puedes iniciar sesión.';
      }
    } catch (e) {
      msg.textContent = 'Error inesperado: ' + e.message;
    }
  </script>
</body>
</html>
