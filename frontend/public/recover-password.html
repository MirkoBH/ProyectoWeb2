<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Recuperar Contrasena | AutoMarket</title>
  <meta name="description" content="Recupera tu cuenta de AutoMarket con Supabase." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Manrope:wght@600;700;800&display=swap" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous" />
  <link rel="stylesheet" href="./src/css/styles.css" />
</head>
<body class="bg-brand-paper text-brand-ink">
  <header>
    <nav class="navbar navbar-expand-lg nav-follow glass-nav repo-navbar py-2 border-b border-white/60 bg-white/55 backdrop-blur-md">
      <div class="container max-w-7xl">
        <a class="navbar-brand fw-bold brand-mark repo-brand d-inline-flex align-items-center gap-2" href="./index.html#home">
          <span class="repo-brand-icon" aria-hidden="true">🚗</span>
          <span>AutoMarket</span>
        </a>
      </div>
    </nav>
  </header>

  <main class="py-5">
    <section class="container" style="max-width: 760px;">
      <article class="card border-0 shadow-soft p-4 p-md-5">
        <p class="kicker mb-2">Acceso seguro</p>
        <h1 class="h3 mb-2">Recuperar contrasena</h1>
        <p class="text-muted mb-4">Ingresa tu email para recibir el enlace de recuperacion. Si vienes desde ese enlace, podras definir una nueva contrasena aqui.</p>

        <div id="recoverFeedback" class="alert d-none" role="alert"></div>

        <details class="mb-4" id="supabaseConfigDetails">
          <summary class="fw-semibold">Configuracion de Supabase</summary>
          <div class="mt-3">
            <div class="mb-3">
              <label class="form-label" for="supabaseUrl">Supabase URL</label>
              <input id="supabaseUrl" class="form-control" type="url" placeholder="https://tu-proyecto.supabase.co" />
            </div>
            <div class="mb-3">
              <label class="form-label" for="supabaseAnonKey">Supabase Anon Key</label>
              <input id="supabaseAnonKey" class="form-control" type="text" placeholder="eyJhbGciOi..." />
            </div>
            <button type="button" class="btn btn-outline-dark" id="saveSupabaseConfigButton">Guardar configuracion</button>
          </div>
        </details>

        <form id="requestRecoveryForm" novalidate>
          <div class="mb-3">
            <label class="form-label" for="recoveryEmail">Email</label>
            <input id="recoveryEmail" class="form-control" type="email" required />
          </div>
          <button type="submit" class="btn btn-primary-red" id="requestRecoveryButton">Enviar enlace de recuperacion</button>
        </form>

        <form id="resetPasswordForm" class="d-none" novalidate>
          <div class="mb-3">
            <label class="form-label" for="newPassword">Nueva contrasena</label>
            <input id="newPassword" class="form-control" type="password" minlength="6" required />
          </div>
          <div class="mb-3">
            <label class="form-label" for="confirmPassword">Confirmar contrasena</label>
            <input id="confirmPassword" class="form-control" type="password" minlength="6" required />
          </div>
          <button type="submit" class="btn btn-primary-red" id="resetPasswordButton">Actualizar contrasena</button>
        </form>

        <div class="mt-4">
          <a href="./index.html" class="text-decoration-none">Volver a inicio</a>
        </div>
      </article>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="./src/js/recover-password.js"></script>
</body>
</html>
